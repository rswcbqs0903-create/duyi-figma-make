services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    # 我们不在构建时传参，直接在运行时或使用 pnpm 自带的配置来解决
    network_mode: "host"  # <--- 添加这一行，强制使用宿主机网络
    env_file:
      - ./server/.env
    environment:
      - PORT=7001
      - PNPM_CONFIG_IGNORE_SCRIPTS=false
    ports:
      - "7001:7001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://server:7001
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_URL=http://server:7001
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
